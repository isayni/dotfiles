[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "#928374"
blue = "#83a598"
cyan = "#8ec07c"
green = "#b8bb26"
magenta = "#d3869b"
red = "#fb4934"
white = "#fbf1c7"
yellow = "#fabd2f"

[colors.normal]
black = "#282828"
blue = "#458588"
cyan = "#689d6a"
green = "#98971a"
magenta = "#b16286"
red = "#cc241d"
white = "#ebdbb2"
yellow = "#d79921"

[colors.primary]
background = "#101010"
foreground = "#fbf1c7"
# background = "#000000"
# foreground = "#ffffff"

[cursor]
style = "Block"
unfocused_hollow = false

[font]
size = 12

[font.normal]
family = "JetBrainsMono NF Semibold"

[scrolling]
history = 1000
multiplier = 5

[window]
opacity = 0.96

[window.padding]
x = 14
y = 8
